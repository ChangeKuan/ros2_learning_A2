syntax = "proto3";
package aimdk.protocol;

message LocalHeader {
  uint64 frame_id = 1;
  int64 raw_timestamp = 2;
}

message AsrResult {
  LocalHeader header = 1;
  string text = 2;
  string event_id = 3;
  float confidence = 4;
  string language_type = 5;
  string error = 6;
  bool is_final = 7;
  bool is_wakeup_word = 8;
}
syntax = "proto3";
package aimdk.protocol;

import public "aimdk/protocol/common/rpc.proto";
import public "aimdk/protocol/common/control_source.proto";


// 设置工作模式
message McWorkModeRequest {
  // 请求头
  RequestHeader header = 1;
  // 模式
  ControlSource mode = 2;
}

// 获取工作模式
message McWorkModeResponse {
  // 响应头
  ResponseHeader header = 1;
  // 模式
  ControlSource mode = 2;
}
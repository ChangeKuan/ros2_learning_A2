syntax = "proto3";
package aimdk.protocol;

import public "aimdk/protocol/common/rpc.proto";
import public "aimdk/protocol/hal/temp/temp.proto";

/**
 * @brief 由 aimrt_hal 中提供的电机温度状态查询服务
 */
service HalTempService {
  /**
   * @brief 获取当前电机温度状态信息。
   * @param CommonRequest: 获取电机温度状态请求
   * @return RgbLightStateRsp: 获取电机温度状态响应
   */
  rpc GetTempState(CommonRequest) returns (TempStateRsp);
}
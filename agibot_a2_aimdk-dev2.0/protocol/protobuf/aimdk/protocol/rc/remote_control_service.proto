syntax = "proto3";
package aimdk.protocol;

import public "aimdk/protocol/common/header.proto";
import public "aimdk/protocol/common/rpc.proto";
import public "aimdk/protocol/rc/remote_command.proto";
//import public "aimdk/protocol/rc/remote_control_channel.proto";
import public "aimdk/protocol/mc/action/mc_action.proto";
import public "aimdk/protocol/motion_player/motion_command.proto";
import public "aimdk/protocol/rc/remote_player.proto";
import public "aimdk/protocol/mc/motion/mc_adjust.proto";

/**
 * @brief иҝҗжҺ§иҝңзЁӢжңҚеҠЎ
 */
service RemoteControlService {

  // и®ҫзҪ®иҝңзЁӢжҺ§еҲ¶жЁЎејҸ
  rpc SetRemoteControlEnableMode(RcEnableModeRequest) returns (CommonResponse);
  // иҺ·еҸ–иҝңзЁӢжҺ§еҲ¶жЁЎејҸ
  rpc GetRemoteControlEnableMode(CommonRequest) returns (RcGetEnableModeResponse);

  // actionзӣёе…і
  rpc SetAction(McActionRequest) returns (CommonResponse);
  // жҹҘиҜўжңәеҷЁдәәActionе‘Ҫд»Ө
  rpc GetAction(CommonRequest) returns (McActionResponse);
  // жҹҘиҜўжңәеҷЁдәәеҸҜз”Ёзҡ„Action
  rpc GetAvailableActions(CommonRequest) returns (AvailableActionsResponse);
  // жҹҘиҜўжңәеҷЁдәәеҸҜз”Ёзҡ„Actionе‘Ҫд»Ө
  rpc GetAvailableCommands(CommonRequest) returns (AvailableCommandResponse);

  // motion_player зӣёе…і
  rpc SendMotionCommand(MotionCommandRequest) returns (CommonResponse);
  rpc GetMotionStatus(CommonRequest) returns (MotionCommandResponse);
  rpc GetMotionList(CommonRequest) returns (MotionListResponse);


  // rpc SetJointStepAngle(RCJointStepAngleRequest) returns (CommonResponse);

  // дҪҝиғҪ/дёҚдҪҝиғҪ RCе®ҡж—¶еҸ‘йҖҒе…іиҠӮзҠ¶жҖҒ
  rpc EnableRcSendJointStates(CommonRequest) returns (CommonResponse);
  rpc DisableRcSendJointStates(CommonRequest) returns (CommonResponse);

  rpc ChangeJointState(RcJointStatesChangeRequest) returns (CommonResponse);
  rpc ChangeJointDescartesStates(RcJointStatesDescartesChangeRequest) returns (CommonResponse);

  // и®ҫзҪ®е…іиҠӮиҪҜйҷҗдҪҚ
  rpc SetJointParams(RcJointParamRequest) returns (CommonResponse);

  // mc adjust е‘Ҫд»Ө
  rpc SendMotionAdjustCommand(AdjustCommandRequest) returns (RcCommonResponse);

  // жҺ§еҲ¶зҠ¶жҖҒдҪҝиғҪеҠҹиғҪ
  rpc JointControlSwitchCommand(RcJointControlSwitchRequest) returns (RcCommonResponse);

  // еӨҙйғЁйўҲйғЁеҠЁдҪңеҠҹиғҪ
  rpc NeckControlCommand(RcNeckControlRequest) returns (RcCommonResponse);
}

/**
 * @brief еҠЁдҪңж’ӯж”ҫиҝңзЁӢжңҚеҠЎ
 */
service RcMotionPlayerService {
  // ејҖе§ӢеҸ‘йҖҒеҠЁдҪңдҝЎжҒҜ
  rpc BeginSendMotionStream(RcMotionStreamBeginRequest) returns (CommonResponse);
  // з»“жқҹеҸ‘йҖҒеҠЁдҪңдҝЎжҒҜ
  rpc EndSendMotionStream(RcMotionStreamEndRequest) returns (CommonResponse);
  // еҸ‘йҖҒеҠЁдҪңдҝЎжҒҜпјҢдјҡеҸ‘йҖҒеӨҡж¬ЎпјҢйңҖиҰҒе°ҶеҠЁдҪңдҝЎжҒҜжӢјжҺҘиө·жқҘ
  rpc SendMotionStream(RcMotionStreamRequest) returns (CommonResponse);
  // иҺ·еҸ–еҠЁдҪңеҲ—иЎЁ
  rpc GetMotionList(CommonRequest) returns (RcMotionListResponse);
  // еўһеҠ еҠЁдҪң
  rpc CreateMotion(RcCreateMotionRequest) returns (RcMotionCommonResponse);
  // еҲ йҷӨеҠЁдҪң
  rpc DeleteMotion(RcDeleteMotionRequest) returns (RcMotionCommonResponse);
  // йҮҚе‘ҪеҗҚеҠЁдҪң
  rpc RenameMotion(RcRenameMotionRequest) returns (RcMotionCommonResponse);
  // ж’ӯж”ҫеҠЁдҪң
  rpc PlayerMotion(RcPlayerMotionRequest) returns (CommonResponse);
  // reset motion
  rpc ResetMotion(CommonRequest) returns (CommonResponse);
  // дҝқеӯҳеҪ•еҲ¶еҠЁдҪң
  rpc SaveRecordedMotion(RcRecordedMotionRequest) returns (CommonResponse);
  // дёўејғеҪ•еҲ¶еҠЁдҪң
  rpc DiscardRecordedMotion(RcRecordedMotionRequest) returns (CommonResponse);
  // жү№йҮҸдёҠдј еҠЁдҪң
  rpc BatchUploadMotion(RcBatchUploadMotionRequest) returns (CommonResponse);
  // еҸ–ж¶Ҳжү№йҮҸдёҠдј еҠЁдҪң
  rpc BatchUploadMotionCancel(CancelUploadRequest) returns (CommonResponse);
}

/**
 * @brief иЎЁжғ…ж’ӯж”ҫжңҚеҠЎ
 */
service RcEmoticonPlayerService {
  // ејҖе§ӢеҸ‘йҖҒиЎЁжғ…дҝЎжҒҜ
  rpc BeginSendEmoticonStream(RcEmoticonStreamBeginRequest) returns (CommonResponse);
  // з»“жқҹеҸ‘йҖҒиЎЁжғ…дҝЎжҒҜ
  rpc EndSendEmoticonStream(RcEmoticonStreamEndRequest) returns (CommonResponse);
  // еҸ‘йҖҒиЎЁжғ…дҝЎжҒҜпјҢдјҡеҸ‘йҖҒеӨҡж¬ЎпјҢйңҖиҰҒе°ҶиЎЁжғ…дҝЎжҒҜжӢјжҺҘиө·жқҘ
  rpc SendEmoticonStream(RcEmoticonStreamRequest) returns (CommonResponse);
  // иҺ·еҸ–иЎЁжғ…еҲ—иЎЁ
  rpc GetEmoticonList(CommonRequest) returns (RcEmoticonListResponse);
  // еўһеҠ иЎЁжғ…
  rpc CreateEmoticon(RcCreateEmoticonRequest) returns (RcEmoticonCommonResponse);
  // еҲ йҷӨиЎЁжғ…
  rpc DeleteEmoticon(RcDeleteEmoticonRequest) returns (RcEmoticonCommonResponse);
  // йҮҚе‘ҪеҗҚиЎЁжғ…
  rpc RenameEmoticon(RcRenameEmoticonRequest) returns (RcEmoticonCommonResponse);
  // ж’ӯж”ҫиЎЁжғ…
  rpc PlayerEmoticon(RcPlayerEmoticonRequest) returns (RcPlayerEmoticonResponse);
  // жү№йҮҸдёҠдј иЎЁжғ…
  rpc BatchUploadEmoticon(RcBatchUploadEmoticonRequest) returns (CommonResponse);
  // еҸ–ж¶Ҳжү№йҮҸдёҠдј иЎЁжғ…
  rpc BatchUploadEmoticonCancel(CancelUploadRequest) returns (CommonResponse);
  // зј–иҫ‘иЎЁжғ…
  rpc EditEmoticon(RcEditEmoticonRequest) returns (RcEmoticonCommonResponse);
}

syntax = "proto3";
package aimdk.protocol;

import "aimdk/protocol/common/header.proto";

/**
 * @brief ...
 */
message DepthRecoverRequest {
  RequestHeader header = 1;

  int32 height = 2;
  int32 width = 3;

  bytes image = 4;
  bytes depth = 5;

  // extra info
  map<string, string> extra = 255;
}

/**
 * @brief ...
 */
message DepthRecoverResponse {
  ResponseHeader header = 1;

  bytes recovered_depth = 5;

  // extra info
  map<string, string> extra = 255;
}

/**
 * @brief ...
 */
service DepthRecoveryService {
  /**
   * @brief ...
   * @param  DepthRecoverRequest  ...
   * @return DepthRecoverResponse ...
   */
  rpc DepthRecover(DepthRecoverRequest) returns (DepthRecoverResponse);
}

aimrt:
  plugin:
    plugins:
      - name: iceoryx_plugin
        path: ${AIMRT_PLUGIN_DIR}/libaimrt_iceoryx_plugin.so
  log:
    core_lvl: INFO # Trace/Debug/Info/Warn/Error/Fatal/Off
    backends:
      - type: console
  executor:
  channel:
    backends:
      - type: iceoryx
    sub_topics_options:
      - topic_name: "(.*)"
        enable_backends: [iceoryx]
  module:
    modules:
      - name: InteractiveCameraSubscriberModule
        log_lvl: INFO
